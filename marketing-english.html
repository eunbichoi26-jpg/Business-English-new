<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MKT English">
<meta name="theme-color" content="#0F172A">
<title>Marketing English</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0F172A; font-family: -apple-system, 'SF Pro Display', sans-serif; color: #E2E8F0; overscroll-behavior: none; }
  #app { min-height: 100vh; min-height: -webkit-fill-available; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── HOME ── */
  .home-header { border-bottom: 1px solid #1E293B; padding: 52px 24px 20px; display: flex; align-items: center; justify-content: space-between; }
  .home-label { font-size: 11px; letter-spacing: .15em; color: #38BDF8; font-weight: 600; text-transform: uppercase; }
  .home-title { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .streak-label { font-size: 11px; color: #64748B; text-align: right; }
  .streak-num { font-size: 24px; font-weight: 800; color: #38BDF8; }

  .home-body { padding: 24px; }
  .day-card { background: linear-gradient(135deg,#1E3A5F,#0F2744); border-radius: 16px; padding: 24px; border: 1px solid #1E4A7C; margin-bottom: 16px; }
  .day-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .day-num { font-size: 11px; color: #38BDF8; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
  .day-heading { font-size: 26px; font-weight: 800; margin-top: 4px; }
  .review-badge { background: #7C3AED20; border: 1px solid #7C3AED60; border-radius: 8px; padding: 4px 10px; font-size: 11px; color: #A78BFA; white-space: nowrap; }
  .preview-label { font-size: 13px; color: #94A3B8; margin-bottom: 12px; }
  .preview-item { background: #0F172A50; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; color: #CBD5E1; line-height: 1.5; }
  .preview-num { color: #38BDF8; margin-right: 8px; font-size: 11px; }
  .preview-more { font-size: 12px; color: #475569; margin-top: 6px; }

  .method-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .method-card { background: #1E293B; border-radius: 12px; padding: 14px 10px; text-align: center; }
  .method-icon { font-size: 22px; }
  .method-name { font-size: 12px; font-weight: 600; margin-top: 6px; color: #E2E8F0; }
  .method-desc { font-size: 10px; color: #64748B; margin-top: 2px; }

  .btn-start { width: 100%; padding: 18px; border-radius: 14px; border: none; cursor: pointer; background: linear-gradient(135deg,#0EA5E9,#6366F1); color: white; font-weight: 700; font-size: 17px; letter-spacing: .02em; }

  .progress-section { margin-top: 20px; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #64748B; margin-bottom: 10px; }
  .dot-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .day-dot { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
  .dot-done { background: #0EA5E9; color: white; }
  .dot-today { background: #1E3A5F; color: #38BDF8; border: 1px solid #38BDF8; }
  .dot-future { background: #1E293B; color: #334155; }

  .btn-reset { background: none; border: none; color: #334155; font-size: 11px; cursor: pointer; display: block; margin: 16px auto 32px; }

  /* ── LEARN ── */
  .learn-topbar { padding: 52px 20px 0; }
  .learn-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .btn-back { background: none; border: none; color: #64748B; cursor: pointer; font-size: 20px; padding: 0; }
  .progress-bar-wrap { flex: 1; height: 6px; background: #1E293B; border-radius: 99px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#0EA5E9,#6366F1); border-radius: 99px; transition: width .3s; }
  .progress-count { font-size: 12px; color: #64748B; white-space: nowrap; }
  .badge-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .badge-tag { background: #0EA5E920; color: #38BDF8; border: 1px solid #0EA5E940; }
  .badge-review { background: #7C3AED20; color: #A78BFA; border: 1px solid #7C3AED40; }
  .badge-phase { background: #1E293B; color: #64748B; }

  .learn-body { padding: 0 20px 32px; }

  /* Dialog */
  .sentence-card { background: #1E293B; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .card-label { font-size: 11px; color: #64748B; margin-bottom: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .sentence-en { font-size: 17px; font-weight: 600; color: #38BDF8; line-height: 1.6; margin-bottom: 8px; }
  .sentence-ko { font-size: 14px; color: #94A3B8; line-height: 1.6; }

  .dialog-label { font-size: 12px; color: #64748B; margin-bottom: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .dialog-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .dialog-row { display: flex; gap: 10px; align-items: flex-end; }
  .dialog-row.right { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .avatar-you { background: linear-gradient(135deg,#0EA5E9,#6366F1); color: white; }
  .avatar-other { background: #1E293B; color: #64748B; }
  .bubble-wrap { max-width: 78%; }
  .bubble-name { font-size: 10px; color: #475569; margin-bottom: 3px; }
  .bubble-name.right { text-align: right; }
  .bubble { padding: 10px 14px; font-size: 14px; color: #E2E8F0; line-height: 1.55; }
  .bubble-you { background: linear-gradient(135deg,#0C4A6E,#1E1B4B); border: 1px solid #0EA5E940; border-radius: 14px 14px 4px 14px; }
  .bubble-other { background: #1E293B; border: 1px solid #334155; border-radius: 14px 14px 14px 4px; }

  .btn-dialog { width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; }
  .btn-secondary { background: #1E293B; color: #94A3B8; }
  .btn-primary { background: linear-gradient(135deg,#0EA5E9,#6366F1); color: white; }

  /* Fill */
  .fill-sentence { font-size: 16px; color: #E2E8F0; line-height: 1.7; font-weight: 500; }
  .blank-hidden { background: #334155; color: transparent; padding: 2px 8px; border-radius: 6px; transition: all .2s; }
  .blank-revealed { background: #0C4A6E; color: #38BDF8; padding: 2px 8px; border-radius: 6px; }
  .fill-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #1E293B; color: #E2E8F0; font-size: 14px; font-family: inherit; resize: none; height: 80px; outline: none; margin-bottom: 10px; }
  .answer-box { background: #052E16; border: 1px solid #166534; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .answer-label { font-size: 11px; color: #4ADE80; margin-bottom: 6px; font-weight: 600; }
  .answer-text { font-size: 15px; color: #86EFAC; }
  .my-answer-box { background: #1E293B; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .my-answer-label { font-size: 11px; color: #64748B; margin-bottom: 6px; }
  .my-answer-text { font-size: 14px; color: #CBD5E1; }

  /* Translate */
  .translate-card { background: #1E293B; border-radius: 14px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .translate-label { font-size: 11px; color: #64748B; margin-bottom: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .translate-ko { font-size: 20px; font-weight: 700; color: #E2E8F0; line-height: 1.6; }
  .think-box { background: #0F172A; border: 2px dashed #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
  .think-text { color: #475569; font-size: 14px; text-align: center; }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .score-btn { padding: 14px 8px; border-radius: 12px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; line-height: 1.4; }

  /* ── RESULT ── */
  .result-body { padding: 32px 24px 24px; }
  .result-header { text-align: center; margin-bottom: 28px; }
  .result-emoji { font-size: 48px; margin-bottom: 8px; }
  .result-title { font-size: 24px; font-weight: 800; }
  .result-sub { font-size: 14px; color: #64748B; margin-top: 6px; }
  .score-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .score-cell { border-radius: 12px; padding: 14px 8px; text-align: center; }
  .score-num { font-size: 26px; font-weight: 800; }
  .score-name { font-size: 10px; margin-top: 4px; line-height: 1.4; }
  .review-list-label { font-size: 12px; color: #64748B; margin-bottom: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .review-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .review-item { background: #1E293B; border-radius: 12px; padding: 14px 16px; }
  .review-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .review-item-tag { font-size: 10px; color: #64748B; }
  .review-item-en { font-size: 14px; color: #E2E8F0; line-height: 1.6; margin-bottom: 4px; }
  .review-item-ko { font-size: 12px; color: #64748B; line-height: 1.5; }
  .tip-box { background: #1C0A00; border: 1px solid #92400E; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
  .tip-title { font-size: 13px; color: #FCD34D; font-weight: 600; margin-bottom: 4px; }
  .tip-text { font-size: 13px; color: #D97706; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div>
        <div class="home-label">Marketing English</div>
        <div class="home-title">Daily Training</div>
      </div>
      <div>
        <div class="streak-label">연속 학습</div>
        <div class="streak-num" id="home-streak">0일</div>
      </div>
    </div>
    <div class="home-body">
      <div class="day-card">
        <div class="day-card-top">
          <div>
            <div class="day-num" id="home-day-num">Day 1</div>
            <div class="day-heading">오늘의 학습</div>
          </div>
          <div id="home-review-badge" class="review-badge" style="display:none"></div>
        </div>
        <div class="preview-label">오늘 배울 문장 미리보기</div>
        <div id="home-preview"></div>
      </div>

      <div class="method-grid">
        <div class="method-card"><div class="method-icon">💬</div><div class="method-name">다이얼로그</div><div class="method-desc">실전 회의 맥락</div></div>
        <div class="method-card"><div class="method-icon">✏️</div><div class="method-name">빈칸채우기</div><div class="method-desc">능동 회상</div></div>
        <div class="method-card"><div class="method-icon">🧠</div><div class="method-name">한→영 번역</div><div class="method-desc">장기기억 전환</div></div>
      </div>

      <button class="btn-start" onclick="startLearn()">학습 시작 →</button>

      <div class="progress-section" id="home-progress-section" style="display:none">
        <div class="progress-label" id="home-progress-label"></div>
        <div class="dot-grid" id="home-dot-grid"></div>
      </div>

      <div id="save-guide" style="background:#1E293B;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px">
        <div style="font-size:12px;color:#38BDF8;font-weight:600;margin-bottom:8px">📱 홈 화면 앱으로 저장하기</div>
        <div style="font-size:12px;color:#94A3B8;line-height:1.9">
          1. 아래 버튼으로 코드 복사<br>
          2. 아이폰 <b style="color:#E2E8F0">메모</b> 앱 열기<br>
          3. 새 메모에 붙여넣기<br>
          4. 메모 우측상단 <b style="color:#E2E8F0">···</b> → <b style="color:#E2E8F0">공유</b> → <b style="color:#E2E8F0">파일로 저장</b><br>
          &nbsp;&nbsp;&nbsp;파일명: <b style="color:#38BDF8">mkt.html</b><br>
          5. 파일 앱에서 찾아 Safari로 열기<br>
          6. Safari 하단 공유버튼 → <b style="color:#E2E8F0">홈 화면에 추가</b>
        </div>
        <button onclick="copyCode()" id="copy-btn" style="margin-top:12px;width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#0EA5E9,#6366F1);color:white;font-weight:600;font-size:14px">
          📋 전체 코드 복사하기
        </button>
      </div>
      <button class="btn-reset" onclick="resetAll()">처음부터 다시 시작</button>
    </div>
  </div>

  <!-- LEARN -->
  <div id="screen-learn" class="screen">
    <div class="learn-topbar">
      <div class="learn-nav">
        <button class="btn-back" onclick="showScreen('home')">←</button>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="learn-bar"></div></div>
        <div class="progress-count" id="learn-count"></div>
      </div>
      <div class="badge-row" id="learn-badges"></div>
    </div>
    <div class="learn-body" id="learn-body"></div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-body">
      <div class="result-header">
        <div class="result-emoji" id="result-emoji">🎉</div>
        <div class="result-title" id="result-title"></div>
        <div class="result-sub" id="result-sub"></div>
      </div>
      <div class="score-summary" id="result-summary"></div>
      <div class="review-list-label">오늘 학습한 문장</div>
      <div class="review-list" id="result-list"></div>
      <div id="result-tip" style="display:none" class="tip-box">
        <div class="tip-title">💡 학습 팁</div>
        <div class="tip-text" id="result-tip-text"></div>
      </div>
      <button class="btn-start" onclick="showScreen('home')">홈으로 →</button>
    </div>
  </div>

</div>

<script>
// ── CURRICULUM ──────────────────────────────────────────────────────────────
const CURRICULUM = [
  [
    { en: "Let me walk you through what each metric on this dashboard means.", ko: "이 대시보드의 각 지표가 무엇을 의미하는지 설명해 드리겠습니다.", tag: "대시보드 설명" },
    { en: "This section shows the traffic coming directly from LG.com campaigns.", ko: "이 섹션은 LG닷컴 캠페인에서 유입되는 트래픽을 보여줍니다.", tag: "대시보드 설명" },
    { en: "If the number looks off, check whether the date range filter is set correctly.", ko: "수치가 이상해 보이면 날짜 범위 필터가 올바르게 설정되어 있는지 확인해 보세요.", tag: "대시보드 설명" },
    { en: "The green arrow means performance is up compared to the previous period.", ko: "녹색 화살표는 이전 기간 대비 성과가 향상되었음을 의미합니다.", tag: "대시보드 설명" },
    { en: "I'll share the dashboard link with view access after this call.", ko: "이 통화 후 조회 권한이 있는 대시보드 링크를 공유해 드리겠습니다.", tag: "대시보드 설명" },
  ],
  [
    { en: "The first step is to upload your product image or select one from the library.", ko: "첫 번째 단계는 제품 이미지를 업로드하거나 라이브러리에서 선택하는 것입니다.", tag: "Content Agent" },
    { en: "Next, choose a quick prompt that's closest to the type of content you want to create.", ko: "다음으로, 만들고자 하는 콘텐츠 유형과 가장 유사한 Quick Prompt를 선택하세요.", tag: "Content Agent" },
    { en: "Please avoid writing the full prompt from scratch — it may cause the agent to return an error.", ko: "프롬프트를 처음부터 직접 전부 작성하면 오류가 발생할 수 있으니 주의하세요.", tag: "Content Agent" },
    { en: "After selecting the prompt, click through the options to set atmosphere, ethnicity, and background.", ko: "프롬프트를 선택한 후, 옵션을 클릭해서 분위기, 인종, 배경 등을 설정하세요.", tag: "Content Agent" },
    { en: "Finally, choose your output size, resolution, and the number of assets to generate.", ko: "마지막으로 결과물 사이즈, 해상도, 생성 개수를 선택하고 생성하면 됩니다.", tag: "Content Agent" },
  ],
  [
    { en: "HQ has produced a new USP video that we'd like all markets to roll out this quarter.", ko: "본사에서 이번 분기에 전 마켓이 활용하길 바라는 새 USP 영상을 제작했습니다.", tag: "USP 영상 전파" },
    { en: "The video is available in the global asset library under the Q3 folder.", ko: "영상은 글로벌 에셋 라이브러리의 Q3 폴더에서 확인하실 수 있습니다.", tag: "USP 영상 전파" },
    { en: "Please use this video as the hero asset for your local campaign.", ko: "이 영상을 로컬 캠페인의 핵심 에셋으로 사용해 주시기 바랍니다.", tag: "USP 영상 전파" },
    { en: "If you need a subtitled version, let me know your language and I'll arrange it.", ko: "자막 버전이 필요하시면 사용 언어를 알려주시면 준비해 드리겠습니다.", tag: "USP 영상 전파" },
    { en: "The key message we want to highlight is the product's energy efficiency.", ko: "강조하고자 하는 핵심 메시지는 제품의 에너지 효율성입니다.", tag: "USP 영상 전파" },
  ],
  [
    { en: "HQ is launching a new LG.com page update aligned with the global campaign.", ko: "본사는 글로벌 캠페인에 맞춰 새로운 LG닷컴 페이지 업데이트를 진행합니다.", tag: "LG.com 안내" },
    { en: "Please make sure your local LG.com banners are updated by the launch date.", ko: "론칭일까지 로컬 LG닷컴 배너를 업데이트해 주시기 바랍니다.", tag: "LG.com 안내" },
    { en: "The global template is locked, but you can customize the copy in the designated areas.", ko: "글로벌 템플릿은 고정되어 있지만 지정된 영역의 카피는 현지화할 수 있습니다.", tag: "LG.com 안내" },
    { en: "Could you confirm which product categories are live on your local LG.com?", ko: "로컬 LG닷컴에 어떤 제품 카테고리가 운영 중인지 확인해 주시겠어요?", tag: "LG.com 안내" },
    { en: "All LG.com content must go through the global review process before publishing.", ko: "모든 LG닷컴 콘텐츠는 게시 전 글로벌 검토 프로세스를 거쳐야 합니다.", tag: "LG.com 안내" },
  ],
  [
    { en: "The spike you see here was driven by the global campaign that ran in March.", ko: "여기서 보이는 급등은 3월에 진행된 글로벌 캠페인으로 인한 것입니다.", tag: "데이터 해석" },
    { en: "This metric measures how many visitors came from paid search versus organic.", ko: "이 지표는 유료 검색과 오가닉에서 각각 몇 명이 방문했는지를 측정합니다.", tag: "데이터 해석" },
    { en: "A low click-through rate here usually means the banner creative needs refreshing.", ko: "여기서 클릭률이 낮다는 것은 보통 배너 소재 교체가 필요하다는 의미입니다.", tag: "데이터 해석" },
    { en: "Let's focus on the conversion funnel — this is where your market is losing users.", ko: "전환 퍼널에 집중해 봅시다 — 여기서 귀 마켓의 사용자 이탈이 발생하고 있습니다.", tag: "데이터 해석" },

// ── DIALOGS ──────────────────────────────────────────────────────────────────
function getDialog(sentence, idx) {
  const d = [
    [
      { sp: "You (HQ)", you: true, text: sentence.en },
      { sp: "Local Marketer", you: false, text: "Thanks for explaining. Should we apply this to all channels?" },
      { sp: "You (HQ)", you: true, text: "Yes, please make sure it's consistent across all your local touchpoints." },
    ],
    [
      { sp: "Local Marketer", you: false, text: "Hi, can you walk us through how this works?" },
      { sp: "You (HQ)", you: true, text: sentence.en },
      { sp: "Local Marketer", you: false, text: "Got it. We'll get started on our end right away." },
    ],
    [
      { sp: "You (HQ)", you: true, text: sentence.en },
      { sp: "Local Marketer", you: false, text: "Understood. Is there a deadline we need to keep in mind?" },
      { sp: "You (HQ)", you: true, text: "Yes, please align with the global launch date. I'll send the details shortly." },
    ],
    [
      { sp: "Local Marketer", you: false, text: "We had a question about the dashboard numbers." },
      { sp: "You (HQ)", you: true, text: sentence.en },
      { sp: "Local Marketer", you: false, text: "That clears things up. We'll update our local report accordingly." },
    ],
    [
      { sp: "You (HQ)", you: true, text: sentence.en },
      { sp: "Local Marketer", you: false, text: "Thanks. Do we need approval before making any changes?" },
      { sp: "You (HQ)", you: true, text: "For major changes, yes — please submit a request and we'll review it quickly." },
    ],
  ];
  return d[idx % d.length];
}

function getFill(en) {
  const words = en.split(' ');
  const cut = Math.max(words.length - 3, Math.floor(words.length * 0.55));
  return { visible: words.slice(0, cut).join(' '), hidden: words.slice(cut).join(' ') };
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentDay = 1;
let activeSentences = [];
let sentenceIdx = 0;
let dialogStep = 0;
let phase = 'dialog'; // dialog | fill | translate
let revealed = false;
let testAnswers = [];

function loadState() {
  try { currentDay = parseInt(localStorage.getItem('mkt_day') || '1'); } catch(e) {}
  try { return JSON.parse(localStorage.getItem('mkt_progress') || '{}'); } catch(e) { return {}; }
}
let progress = loadState();

function saveState() {
  try { localStorage.setItem('mkt_day', currentDay); } catch(e) {}
  try { localStorage.setItem('mkt_progress', JSON.stringify(progress)); } catch(e) {}
}

function buildSentences(day) {
  const today = CURRICULUM[(day - 1) % CURRICULUM.length].map(s => ({ ...s, isReview: false }));
  const reviewDay = day - 13;
  if (reviewDay >= 1) {
    const review = CURRICULUM[(reviewDay - 1) % CURRICULUM.length].map(s => ({ ...s, isReview: true }));
    return [...today, ...review];
  }
  return today;
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'home') renderHome();
}

function renderHome() {
  const done = Object.keys(progress).length;
  document.getElementById('home-streak').textContent = done + '일';
  document.getElementById('home-day-num').textContent = 'Day ' + currentDay;

  const reviewDay = currentDay - 13;
  const badge = document.getElementById('home-review-badge');
  if (reviewDay >= 1) {
    badge.style.display = 'block';
    badge.textContent = '복습 포함 Day ' + reviewDay;
  } else {
    badge.style.display = 'none';
  }

  const todaySentences = CURRICULUM[(currentDay - 1) % CURRICULUM.length];
  const preview = document.getElementById('home-preview');
  preview.innerHTML = todaySentences.slice(0, 3).map((s, i) =>
    `<div class="preview-item"><span class="preview-num">#${i+1}</span>${s.en.length > 65 ? s.en.slice(0,65)+'…' : s.en}</div>`
  ).join('') + (todaySentences.length > 3 ? `<div class="preview-more">+ ${todaySentences.length - 3}개 더</div>` : '');

  if (done > 0) {
    document.getElementById('home-progress-section').style.display = 'block';
    document.getElementById('home-progress-label').textContent = `학습 기록 (${done}/30일)`;
    const grid = document.getElementById('home-dot-grid');
    grid.innerHTML = Array.from({length: 30}, (_, i) => {
      const d = i + 1;
      const cls = d < currentDay ? 'day-dot dot-done' : d === currentDay ? 'day-dot dot-today' : 'day-dot dot-future';
      return `<div class="${cls}">${d}</div>`;
    }).join('');
  }
}

// ── LEARN ─────────────────────────────────────────────────────────────────────
function startLearn() {
  activeSentences = buildSentences(currentDay);
  sentenceIdx = 0; dialogStep = 0; phase = 'dialog'; revealed = false; testAnswers = [];
  showScreen('learn');
  renderLearn();
}

function renderLearn() {
  const total = activeSentences.length;
  const s = activeSentences[sentenceIdx];
  const pct = (sentenceIdx / total) * 100;

  document.getElementById('learn-bar').style.width = pct + '%';
  document.getElementById('learn-count').textContent = (sentenceIdx + 1) + '/' + total;

  const phaseLabel = phase === 'dialog' ? '1/3 다이얼로그' : phase === 'fill' ? '2/3 빈칸채우기' : '3/3 한→영 번역';
  document.getElementById('learn-badges').innerHTML =
    `<span class="badge badge-tag">${s.tag}</span>` +
    (s.isReview ? `<span class="badge badge-review">🔄 복습</span>` : '') +
    `<span class="badge badge-phase">${phaseLabel}</span>`;

  const body = document.getElementById('learn-body');

  if (phase === 'dialog') {
    const dialog = getDialog(s, sentenceIdx);
    const shownLines = dialog.slice(0, dialogStep + 1);
    const isLast = dialogStep >= dialog.length - 1;
    body.innerHTML = `
      <div class="sentence-card">
        <div class="card-label">오늘의 핵심 문장</div>
        <div class="sentence-en">${s.en}</div>
        <div class="sentence-ko">${s.ko}</div>
      </div>
      <div class="dialog-label">실전 회의 다이얼로그</div>
      <div class="dialog-list">
        ${shownLines.map(l => `
          <div class="dialog-row ${l.you ? 'right' : ''}">
            <div class="avatar ${l.you ? 'avatar-you' : 'avatar-other'}">${l.sp[0]}</div>
            <div class="bubble-wrap">
              <div class="bubble-name ${l.you ? 'right' : ''}">${l.sp}</div>
              <div class="bubble ${l.you ? 'bubble-you' : 'bubble-other'}">${l.text}</div>
            </div>
          </div>`).join('')}
      </div>
      <button class="btn-dialog ${isLast ? 'btn-primary' : 'btn-secondary'}" onclick="dialogNext()">
        ${isLast ? '빈칸 채우기로 →' : '다음 대화 →'}
      </button>`;

  } else if (phase === 'fill') {
    const fill = getFill(s.en);
    if (!revealed) {
      body.innerHTML = `
        <div class="sentence-card">
          <div class="card-label">빈칸 채우기</div>
          <div class="sentence-ko" style="margin-bottom:12px">${s.ko}</div>
          <div class="fill-sentence">${fill.visible} <span class="blank-hidden">${fill.hidden}</span></div>
        </div>
        <div class="card-label" style="margin-bottom:8px">이어지는 문장을 완성하세요</div>
        <textarea class="fill-input" id="fill-input" placeholder="${fill.visible} ___"></textarea>
        <button class="btn-dialog btn-primary" onclick="fillCheck()">정답 확인</button>`;
    } else {
      const userVal = (document.getElementById('fill-input') ? document.getElementById('fill-input').value : '') || '';
      body.innerHTML = `
        <div class="sentence-card">
          <div class="card-label">빈칸 채우기</div>
          <div class="sentence-ko" style="margin-bottom:12px">${s.ko}</div>
          <div class="fill-sentence">${fill.visible} <span class="blank-revealed">${fill.hidden}</span></div>
        </div>
        <div class="answer-box"><div class="answer-label">✓ 정답</div><div class="answer-text">${fill.hidden}</div></div>
        ${userVal ? `<div class="my-answer-box"><div class="my-answer-label">내 답변</div><div class="my-answer-text">${userVal}</div></div>` : ''}
        <button class="btn-dialog btn-primary" onclick="goTranslate()">한→영 번역으로 →</button>`;
    }

  } else {
    if (!revealed) {
      body.innerHTML = `
        <div class="translate-card">
          <div class="translate-label">한국어 → 영어로 말해보세요</div>
          <div class="translate-ko">${s.ko}</div>
        </div>
        <div class="think-box"><div class="think-text">머릿속으로 영어 문장을 떠올려보세요</div></div>
        <button class="btn-dialog btn-secondary" onclick="revealTranslate()">정답 보기</button>`;
    } else {
      body.innerHTML = `
        <div class="translate-card">
          <div class="translate-label">한국어 → 영어로 말해보세요</div>
          <div class="translate-ko">${s.ko}</div>
        </div>
        <div class="answer-box"><div class="answer-label">모범 답안</div><div class="answer-text" style="font-size:16px;font-weight:500;line-height:1.7">${s.en}</div></div>
        <div style="font-size:13px;color:#64748B;margin-bottom:14px;text-align:center">얼마나 잘 기억했나요?</div>
        <div class="score-grid">
          <button class="score-btn" style="background:#7F1D1D;border:1px solid #DC2626;color:#FCA5A5" onclick="scoreIt(0)">😅 어려웠어요</button>
          <button class="score-btn" style="background:#1C1917;border:1px solid #92400E;color:#FCD34D" onclick="scoreIt(1)">🤔 애매해요</button>
          <button class="score-btn" style="background:#052E16;border:1px solid #166534;color:#4ADE80" onclick="scoreIt(2)">😊 알았어요!</button>
        </div>`;
    }
  }
}

function dialogNext() {
  const s = activeSentences[sentenceIdx];
  const dialog = getDialog(s, sentenceIdx);
  if (dialogStep < dialog.length - 1) { dialogStep++; renderLearn(); }
  else { phase = 'fill'; revealed = false; renderLearn(); }
}

function fillCheck() {
  revealed = true; renderLearn();
}

function goTranslate() {
  phase = 'translate'; revealed = false; renderLearn();
}

function revealTranslate() {
  revealed = true; renderLearn();
}

function scoreIt(score) {
  testAnswers.push({ sentence: activeSentences[sentenceIdx], score });
  const next = sentenceIdx + 1;
  if (next < activeSentences.length) {
    sentenceIdx = next; dialogStep = 0; phase = 'dialog'; revealed = false;
    renderLearn();
  } else {
    finishSession();
  }
}

function finishSession() {
  const key = new Date().toISOString().split('T')[0];
  progress[key] = testAnswers.map(a => a.score);
  currentDay = Math.min(currentDay + 1, 30);
  saveState();
  renderResult();
  showScreen('result');
}

function renderResult() {
  const perfect = testAnswers.filter(a => a.score === 2).length;
  const ok = testAnswers.filter(a => a.score === 1).length;
  const hard = testAnswers.filter(a => a.score === 0).length;
  const total = testAnswers.length;
  const day = currentDay - 1;

  document.getElementById('result-emoji').textContent = perfect >= total * 0.8 ? '🎉' : perfect >= total * 0.5 ? '💪' : '📚';
  document.getElementById('result-title').textContent = `Day ${day} 완료!`;
  document.getElementById('result-sub').textContent = `${total}개 문장 학습 완료`;

  document.getElementById('result-summary').innerHTML = [
    { label: '완벽히 알았어요', count: perfect, color: '#4ADE80', bg: '#052E16', border: '#166534' },
    { label: '애매했어요', count: ok, color: '#FCD34D', bg: '#1C1917', border: '#92400E' },
    { label: '어려웠어요', count: hard, color: '#FCA5A5', bg: '#7F1D1D', border: '#DC2626' },
  ].map(s => `<div class="score-cell" style="background:${s.bg};border:1px solid ${s.border}">
    <div class="score-num" style="color:${s.color}">${s.count}</div>
    <div class="score-name" style="color:${s.color}99">${s.label}</div>
  </div>`).join('');

  document.getElementById('result-list').innerHTML = testAnswers.map(a => {
    const icon = a.score === 2 ? '✅' : a.score === 1 ? '🔸' : '❌';
    const border = a.score === 2 ? '#4ADE80' : a.score === 1 ? '#FCD34D' : '#EF4444';
    return `<div class="review-item" style="border-left:3px solid ${border}">
      <div class="review-item-top"><span class="review-item-tag">${a.sentence.tag}${a.sentence.isReview ? ' · 복습' : ''}</span><span>${icon}</span></div>
      <div class="review-item-en">${a.sentence.en}</div>
      <div class="review-item-ko">${a.sentence.ko}</div>
    </div>`;
  }).join('');

  const tip = document.getElementById('result-tip');
  if (hard > 0) {
    tip.style.display = 'block';
    document.getElementById('result-tip-text').textContent = `어려웠던 ${hard}개 문장은 내일 다시 등장할 거예요. 포기하지 마세요!`;
  } else { tip.style.display = 'none'; }
}

function resetAll() {
  if (!confirm('처음부터 다시 시작할까요? 학습 기록이 모두 삭제됩니다.')) return;
  try { localStorage.removeItem('mkt_day'); localStorage.removeItem('mkt_progress'); } catch(e) {}
  currentDay = 1; progress = {}; testAnswers = [];
  showScreen('home');
}

// ── COPY CODE ─────────────────────────────────────────────────────────────────
function copyCode() {
  const html = document.documentElement.outerHTML;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(html).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ 복사 완료! 메모 앱에 붙여넣기 하세요';
      btn.style.background = '#052E16';
      setTimeout(() => {
        btn.textContent = '📋 전체 코드 복사하기';
        btn.style.background = 'linear-gradient(135deg,#0EA5E9,#6366F1)';
      }, 3000);
    }).catch(() => fallbackCopy(html));
  } else { fallbackCopy(html); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy');
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 복사 완료! 메모 앱에 붙여넣기 하세요';
    setTimeout(() => { btn.textContent = '📋 전체 코드 복사하기'; }, 3000);
  } catch(e) { alert('복사 실패. 직접 선택해서 복사해주세요.'); }
  document.body.removeChild(ta);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
